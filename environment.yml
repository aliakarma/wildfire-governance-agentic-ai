name: wildfire-gov
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10.14
  - numpy=1.26.4
  - scipy=1.12.0
  - pandas=2.2.1
  - scikit-learn=1.4.1
  - pytorch=2.2.1
  - torchvision=0.17.1
  - cpuonly                        # remove this line to enable GPU
  - geopandas=0.14.3
  - shapely=2.0.3
  - rasterio=1.3.9
  - netcdf4=1.6.5
  - h5py=3.10.0
  - xarray=2024.2.0
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - jupyter=1.0.0
  - ipykernel=6.29.3
  - pip:
      - gymnasium==0.29.1
      - cryptography==42.0.4
      - pynacl==1.5.0
      - omegaconf==2.3.0
      - structlog==24.1.0
      - mlflow==2.11.1
      - rich==13.7.1
      - tqdm==4.66.2
      - python-dotenv==1.0.1
      - click==8.1.7
      - pytest==8.1.1
      - pytest-cov==4.1.0
      - black==24.2.0
      - isort==5.13.2
      - mypy==1.9.0
